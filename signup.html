<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Your Wellness Journey Begins</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Lato', sans-serif;
            background-color: #FDF5E6; /* Old Lace / Soft Beige */
            color: #4A3728; /* Dark brown for readability */
        }
        h1, h2, h3 {
            font-family: 'Playfair Display', serif;
            color: #D2691E; /* Deep Orange */
        }
        .container {
            width: 100%;
            max-width: 600px;
            margin: 40px auto;
            background-color: #ffffff;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
        }
        .hero-img {
            width: 100%;
            height: 250px;
            object-fit: cover;
            display: block;
        }
        .header {
            background-color: #FFF5EE; /* Seashell */
            padding: 40px;
            text-align: center;
            border-bottom: 1px solid #FFE4C4;
        }
        .header h1 {
            font-size: 32px;
            margin: 0;
            color: #E67E22; /* Carrot Orange */
            font-weight: 400;
            letter-spacing: 1px;
        }
        .form-content {
            padding: 50px 40px;
            line-height: 1.8;
            font-size: 16px;
            color: #5D4037;
        }
        .input-group {
            margin-bottom: 25px;
        }
        .input-group label {
            display: block;
            font-weight: 700;
            margin-bottom: 8px;
            color: #4A3728;
            font-size: 14px;
        }
        .input-group input {
            width: 100%;
            padding: 15px;
            border: 1px solid #FFE4C4;
            border-radius: 8px;
            font-size: 16px;
            font-family: 'Lato', sans-serif;
            background-color: #FFFAF0; /* Floral White */
            box-sizing: border-box;
            transition: all 0.3s ease;
        }
        .input-group input:focus {
            outline: none;
            border-color: #F39C12;
            background-color: #ffffff;
            box-shadow: 0 0 0 3px rgba(243, 156, 18, 0.1);
        }
        .signup-button {
            display: block;
            width: 100%;
            background-color: #F39C12;
            color: #ffffff;
            text-decoration: none;
            text-align: center;
            padding: 18px 0;
            border: none;
            border-radius: 50px;
            font-size: 16px;
            font-weight: 700;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Lato', sans-serif;
            box-shadow: 0 4px 15px rgba(243, 156, 18, 0.2);
        }
        .signup-button:hover {
            background-color: #E67E22;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(230, 126, 34, 0.3);
        }
        .footer {
            background-color: #FFF8DC; /* Cornsilk */
            padding: 40px;
            text-align: center;
            color: #8D6E63;
            font-size: 14px;
            line-height: 1.6;
        }
        .footer a {
            color: #E67E22;
            text-decoration: none;
        }
        @media only screen and (max-width: 600px) {
            .container {
                width: 100% !important;
                margin: 0 !important;
                border-radius: 0 !important;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Matching Hero Image -->
        <img src="https://images.unsplash.com/photo-1545208393-216c7fb1bba0?auto=format&fit=crop&q=80&w=1200" alt="Serene Wellness Scene" class="hero-img">

        <!-- Matching Header -->
        <div class="header">
            <h1>Start Your Journey With us</h1>
        </div>

        <!-- Signup Form Content -->
        <div class="form-content">
            <p style="text-align: center; margin-bottom: 40px; color: #D2691E; font-weight: 700;">Join our community for weekly guided meditations and mindful practices. Breathe. You're here.</p>
            
            <form id="signupForm">
                <div class="input-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" name="name" placeholder="Enter your name" required>
                </div>
                <div class="input-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" placeholder="hello@example.com" required>
                </div>
                <button type="submit" class="signup-button">Begin Your Practice</button>
            </form>

            <div id="message" style="display: none; text-align: center; margin-top: 20px; padding: 15px; border-radius: 8px;"></div>
            
            <p style="text-align: center; font-size: 14px; margin-top: 30px;">
                Already a member? <a href="#" style="color: #E67E22; font-weight: 700;">Log in here</a>
            </p>
        </div>

        <!-- Matching Footer -->
        <div class="footer">
            <p>You received this because you're starting your wellness journey.<br>
            Copyright &copy; 2024 Wellness Mind | <a href="#">Privacy Policy</a></p>
        </div>
    </div>

    <script>
        document.getElementById('signupForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const messageDiv = document.getElementById('message');
            const submitBtn = e.target.querySelector('button');

            // Reset message
            messageDiv.style.display = 'none';
            messageDiv.textContent = '';
            
            // Disable button
            submitBtn.disabled = true;
            submitBtn.textContent = 'Joining...';

            try {
                const response = await fetch('/signup', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ name, email }),
                });

                const data = await response.json();

                if (response.ok) {
                    messageDiv.style.display = 'block';
                    messageDiv.style.backgroundColor = '#FFF8DC';
                    messageDiv.style.color = '#D2691E';
                    messageDiv.textContent = 'Welcome! You have successfully joined our community.';
                    e.target.reset();
                } else {
                    throw new Error(data.error || 'Something went wrong');
                }
            } catch (error) {
                messageDiv.style.display = 'block';
                messageDiv.style.backgroundColor = '#FDECEA';
                messageDiv.style.color = '#611A15';
                messageDiv.textContent = error.message;
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = 'Begin Your Practice';
            }
        });
    </script>
</body>
</html>
